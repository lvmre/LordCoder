[runtime]
provider = "ollama"
endpoint = "http://127.0.0.1:11434"
model = "qwen2.5-coder:7b"
context_window = 8192

[permissions]
allow_file_write = false
allow_shell = false

[daemon]
host = "127.0.0.1"
port = 32123

[project]
include = []
ignore = [".git", ".venv", "__pycache__", ".pytest_cache", ".mypy_cache", "node_modules", ".test-temp", ".tmp-selector-test"]
test_command = "python -m pytest -q"
